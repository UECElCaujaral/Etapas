<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEC El Caujaral | Portal Académico</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #84CF56; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background: #73b84a; }
        #panelProfe, #panelEstudiante { display: none; }
        ul { text-align: left; padding: 0; list-style: none; }
        li { background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 4px solid #84CF56; }
    </style>
</head>
<body>

<div class="card" id="loginCard">
    <h2>Inicio de Sesión</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="validar()">Entrar</button>
</div>

<div class="card" id="panelProfe">
    <h2>Panel Docente</h2>
    <select id="estudianteSelect">
        <option value="">Selecciona un estudiante...</option>
        <option value="Sofia">Sofia</option>
        <option value="Alex">Alex</option>
    </select>
    <input type="text" id="grado" placeholder="Grado / Año">
    <input type="text" id="materia" placeholder="Materia">
    <input type="file" id="archivo">
    <button id="btnEnviar" onclick="enviarADireccion()">📤 Enviar a Dirección</button>
</div>

<div class="card" id="panelEstudiante">
    <h2 id="tituloEstudiante"></h2>
    <h3>Mis Calificaciones</h3>
    <ul id="misNotas"></ul>
</div>

<script>
    // Inicialización EmailJS
    (function(){ emailjs.init("3XgvL4XF6IdEb6r-W"); })();
    
    const db = {
        "Pablo": { pass: "123456", tipo: "Profesor" },
        "Juan": { pass: "1234567", tipo: "Profesor" },
        "Sofia": { pass: "123", tipo: "Estudiante", notas: ["Matemáticas: 20", "Historia: 18"] },
        "Alex": { pass: "1234", tipo: "Estudiante", notas: ["Matemáticas: 15", "Historia: 19"] }
    };

    function validar() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (db[u] && db[u].pass === p) {
            document.getElementById('loginCard').style.display = 'none';
            if (db[u].tipo === "Profesor") {
                document.getElementById('panelProfe').style.display = 'block';
            } else {
                document.getElementById('panelEstudiante').style.display = 'block';
                document.getElementById('tituloEstudiante').innerText = `Hola ${u}`;
                db[u].notas.forEach(n => document.getElementById('misNotas').innerHTML += `<li>📚 ${n}</li>`);
            }
        } else { alert("❌ Usuario o contraseña incorrectos."); }
    }

    async function enviarADireccion() {
        const file = document.getElementById('archivo').files[0];
        const estudiante = document.getElementById('estudianteSelect').value;
        const btn = document.getElementById('btnEnviar');
        
        if(!file || !estudiante) return alert("❌ Completa todos los campos y selecciona un archivo.");

        btn.innerText = "Subiendo a GoFile...";
        btn.disabled = true;

        try {
            // Subida a GoFile
            const form = new FormData();
            form.append("file", file);
            const res = await fetch("https://store1.gofile.io/uploadFile", {method:"POST", body:form});
            const json = await res.json();
            
            // Envío a EmailJS (template_4fg6n5u)
            await emailjs.send("service_y70jk69", "template_4fg6n5u", {
                profesor: document.getElementById('user').value,
                estudiante: estudiante,
                grado: document.getElementById('grado').value,
                materia: document.getElementById('materia').value,
                link_descarga: json.data.downloadPage
            });

            alert("✅ ¡Tarea enviada correctamente a la dirección!");
            btn.innerText = "📤 Enviar a Dirección";
            btn.disabled = false;
        } catch (error) {
            alert("❌ Error al enviar. Verifica tu conexión.");
            btn.innerText = "📤 Enviar a Dirección";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
