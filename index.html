<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal UEC El Caujaral</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .section { display: none; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #84CF56; color: white; border: none; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>

    <div id="div-login" class="container">
        <h2>Acceso UEC El Caujaral</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="verificar()">Entrar</button>
    </div>

    <div id="div-profesor" class="container" style="display:none;">
        <h2>Panel Docente</h2>
        <input type="file" id="fileInput">
        <input type="text" id="grado" placeholder="Grado">
        <input type="text" id="materia" placeholder="Materia">
        <select id="alumnoSelect"><option value="Alex">Alex</option><option value="Sofia">Sofia</option></select>
        <button id="btnEnviar" onclick="enviarArchivo()">📤 Enviar</button>
    </div>

    <div id="div-visor" class="container" style="display:none;">
        <h2>Visualizador</h2>
        <iframe id="iframeVisor"></iframe>
        <button onclick="location.href='index.html'">Volver al Inicio</button>
    </div>

    <script>
        (function() { emailjs.init("3XgvL4XF6IdEb6r-W"); })();

        // LÓGICA DE NAVEGACIÓN
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('archivo')) {
                document.getElementById('div-visor').style.display = 'block';
                document.getElementById('iframeVisor').src = "https://docs.google.com/viewer?url=" + encodeURIComponent(params.get('archivo')) + "&embedded=true";
            } else {
                document.getElementById('div-login').style.display = 'block';
            }
        };

        function verificar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === "Carlos" && p === "123456") {
                document.getElementById('div-login').style.display = 'none';
                document.getElementById('div-profesor').style.display = 'block';
            } else { alert("Error"); }
        }

        async function enviarArchivo() {
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('btnEnviar');
            btn.innerText = "Subiendo...";
            
            const formData = new FormData();
            formData.append("file", file);
            const res = await fetch("https://store1.gofile.io/uploadFile", { method: "POST", body: formData });
            const result = await res.json();

            if (result.status === "ok") {
                await emailjs.send("service_y70jk69", "template_4fg6n5u", {
                    estudiante: document.getElementById('alumnoSelect').value,
                    link_descarga: result.data.downloadPage
                });
                alert("✅ Enviado!");
            }
        }
    </script>
</body>
</html>
