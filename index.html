<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Docente - UEC El Caujaral</title>
    <!-- Favicon con el logo -->
    <link rel="icon" href="https://i.ibb.co/s9vjp0PS/347292015-791076059000176-3359367955993139165-n.jpg">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; border: 3px solid #84CF56; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #84CF56; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #73b84b; }
        #panel-profesor { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/s9vjp0PS/347292015-791076059000176-3359367955993139165-n.jpg" class="logo" alt="Logo UEC">
        
        <!-- LOGIN PROFESOR -->
        <div id="login-div">
            <h2 style="color: #333;">Acceso Docente</h2>
            <input type="text" id="user" placeholder="Nombre del Profesor">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="entrar()">Ingresar</button>
        </div>

        <!-- FORMULARIO DE ENVÍO -->
        <div id="panel-profesor">
            <h2 style="color: #333;">Enviar Archivo a Directiva</h2>
            <input type="file" id="fileInput" required>
            <input type="text" id="grado" placeholder="Grado / Año (Ej: 2do Año)" required>
            <input type="text" id="materia" placeholder="Materia (Ej: Matemáticas)" required>
            <input type="text" id="alumno" placeholder="Nombre del Estudiante" required>
            <input type="email" id="email_profesor" placeholder="Tu correo (Para recibir rechazos)" required>
            
            <button id="btnEnviar" onclick="subirYEnviar()">📤 Enviar a Revisión</button>
        </div>
    </div>

    <script>
        (function() { emailjs.init("3XgvL4XF6IdEb6r-W"); })();

        function entrar() {
            if(document.getElementById('user').value.trim() !== "") {
                document.getElementById('login-div').style.display = 'none';
                document.getElementById('panel-profesor').style.display = 'block';
            } else { alert("Ingresa tu nombre"); }
        }

        async function subirYEnviar() {
            const file = document.getElementById('fileInput').files[0];
            const grado = document.getElementById('grado').value;
            const materia = document.getElementById('materia').value;
            const alumno = document.getElementById('alumno').value;
            const emailProfesor = document.getElementById('email_profesor').value;
            const profe = document.getElementById('user').value;
            const btn = document.getElementById('btnEnviar');

            if (!file || !grado || !materia || !alumno || !emailProfesor) {
                return alert("Por favor completa todos los campos.");
            }

            btn.innerText = "Subiendo archivo a la nube...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", file);

            try {
                // Sube a GoFile
                const res = await fetch("https://store1.gofile.io/uploadFile", { method: "POST", body: formData });
                const result = await res.json();

                if (result.status === "ok") {
                    btn.innerText = "Enviando correo a la directiva...";
                    
                    // Manda el correo a la dirección con EmailJS
                    await emailjs.send("service_y70jk69", "template_4fg6n5u", {
                        profesor: profe,
                        email_profesor: emailProfesor,
                        estudiante: alumno,
                        grado: grado,
                        materia: materia,
                        link_descarga: result.data.downloadPage
                    });

                    alert("✅ Archivo enviado exitosamente. En espera de que la directiva lo acepte.");
                    document.getElementById('fileInput').value = "";
                    btn.innerText = "📤 Enviar a Revisión";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Error de conexión. Intenta nuevamente.");
                btn.innerText = "📤 Enviar a Revisión";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
